<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Account — BOLO AI Publishing Pipeline</title>
  <link rel="stylesheet" href="/styles.css" />

  <style>
    .license-box {
      margin-top: 14px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, .08);
      background: rgba(0, 0, 0, .02);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef6ff;
      color: #1d4ed8;
      font-weight: 800;
      font-size: .82rem;
    }

    .license-key {
      font-family: monospace;
      background: #111;
      color: #0f0;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="toplink" href="/">← Home</a>
    <div class="brand">BOLO AI Publishing Pipeline</div>
    <nav class="topnav">
      <a class="toplink" href="/sign-in.html" id="loginLink">Log in</a>
    </nav>
  </header>

  <div style="text-align:center;margin:20px 0;">
    <img src="/BOLO-logo.png" alt="BOLO" style="height:50px;">
  </div>

  <main class="container">
    <section class="card">

      <h1>Account</h1>
      <p class="muted">
        Review your BOLO license and purchase details.
      </p>

      <div id="userArea" style="display:none;">

        <div class="license-box">
          <div class="muted small">Signed in as</div>
          <div id="userEmail" style="font-weight:800;"></div>

          <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <button class="btn" id="logoutBtn" type="button">Log out</button>
            <div id="userButton"></div>
          </div>
        </div>

        <h2 style="margin-top:22px;">License</h2>

        <div id="licensesArea" class="muted">
          Loading license...
        </div>

      </div>

      <div id="guestArea" style="display:none;">
        <div class="hero-actions" style="margin-top:14px;">
          <a class="btn" href="/sign-in.html">Log in</a>
          <a class="btn ghost" href="/sign-up.html">Create account</a>
        </div>
      </div>

      <p id="err" class="muted" style="margin-top:12px;color:#b00020;"></p>

    </section>
  </main>

  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsuYm9sb3dyaXRlci5jb20k"
    src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js"></script>

  <script>
    function formatPlan(plan) {
      return {
        solo_6m: "Individual — 6 months",
        solo_12m: "Individual — 12 months",
        solo_36m: "Individual — 36 months",
        team_3: "Team — 3 users — 12 months",
        team_5: "Team — 5 users — 12 months",
        team_10: "Team — 10 users — 12 months",
        team_3_36m: "Team — 3 users — 36 months",
        team_5_36m: "Team — 5 users — 36 months",
        team_10_36m: "Team — 10 users — 36 months"
      }[plan] || plan;
    }

    window.addEventListener("load", async () => {
      try {
        await Clerk.load();

        const user = Clerk.user;
        const userArea = document.getElementById("userArea");
        const guestArea = document.getElementById("guestArea");
        const loginLink = document.getElementById("loginLink");

        if (!user) {
          guestArea.style.display = "block";
          return;
        }

        if (loginLink) {
          loginLink.textContent = "Account";
          loginLink.href = "/account.html";
        }

        userArea.style.display = "block";

        const email =
          user?.primaryEmailAddress?.emailAddress ||
          user?.emailAddresses?.[0]?.emailAddress ||
          "Signed in";

        document.getElementById("userEmail").textContent = email;

        document.getElementById("logoutBtn").onclick = async () => {
          try {
            await Clerk.signOut();
          } finally {
            location.href = "/";
          }
        };

        if (typeof Clerk.mountUserButton === "function") {
          Clerk.mountUserButton(document.getElementById("userButton"));
        }

        try {
          const token = await Clerk.session.getToken();

          const res = await fetch("/api/licenses", {
            headers: {
              "authorization": `Bearer ${token}`
            }
          });

          if (!res.ok) {
            document.getElementById("licensesArea").textContent = "Failed to load licenses.";
            return;
          }

          const data = await res.json();

          if (!Array.isArray(data?.licenses) || !data.licenses.length) {
            document.getElementById("licensesArea").textContent = "No active licenses found.";
            return;
          }

          document.getElementById("licensesArea").innerHTML = data.licenses
            .map((l) => `
              <div class="license-box">

                <div class="row">
                  <span>Plan</span>
                  <strong>${formatPlan(l.plan)}</strong>
                </div>

                <div class="row">
                  <span>Seats</span>
                  <strong>${l.seats || 1}</strong>
                </div>

                <div class="row">
                  <span>Issued</span>
                  <strong>${l.issued_at || "—"}</strong>
                </div>

                <div class="row">
                  <span>Expires</span>
                  <strong>${l.expires_at || "—"}</strong>
                </div>

                <div class="row">
                  <span>Status</span>
                  <span class="badge">${l.status || "active"}</span>
                </div>

                <div style="margin-top:12px;font-weight:700;">License key</div>

                <div class="license-key">${l.license_key}</div>

                <button class="btn" style="margin-top:10px;"
                  onclick="navigator.clipboard.writeText('${l.license_key}')">
                  Copy license
                </button>

              </div>
            `)
            .join("");

        } catch (e) {
          document.getElementById("licensesArea").textContent = "Error loading license.";
        }

      } catch (e) {
        document.getElementById("err").textContent = e?.message || String(e);
      }
    });
  </script>

</body>
</html>
