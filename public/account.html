<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Account — BOLO</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .license-card { padding:16px; border:1px solid rgba(0,0,0,.08); border-radius:16px; background:#fff; margin-top:14px; }
    .license-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    .license-title { font-weight:800; }
    .license-meta { color:#666; font-size:13px; margin-top:4px; }
    .badge { display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; background:rgba(46,125,50,.12); color:#1b5e20; border:1px solid rgba(46,125,50,.22); }
    .badge.expired { background:rgba(176,0,32,.08); color:#8b0f24; border-color:rgba(176,0,32,.18); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:12px; margin-top:14px; }
    .kv { padding:10px 12px; border-radius:12px; background:rgba(0,0,0,.03); }
    .kv .k { font-size:12px; color:#666; }
    .kv .v { margin-top:4px; font-weight:700; word-break:break-word; }
    .license-key-box { margin-top:14px; padding:12px; border-radius:12px; border:1px solid rgba(0,0,0,.08); background:#fafafa; }
    .license-key-box pre { margin:8px 0 0 0; white-space:pre-wrap; word-break:break-all; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; font-size:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="toplink" href="/">← Home</a>
    <a class="brand brand-link" href="/">
      <img class="brand-logo" src="/BOLO-logo.png" alt="BOLO" loading="eager" />
    </a>
    <nav class="topnav">
      <a class="toplink" href="/sign-in.html" id="loginLink">Log in</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Account</h1>
      <p class="muted">Sign in to see your BOLO licenses and copy your license key.</p>

      <div id="userArea" style="display:none;">
        <div class="callout" style="margin-top:14px;">
          <div class="muted small">Signed in as</div>
          <div id="userEmail" style="font-weight:800;"></div>
          <div style="margin-top:10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button class="btn" id="logoutBtn" type="button">Log out</button>
            <div id="userButton"></div>
          </div>
        </div>

        <h2 style="margin-top:22px;">Your licenses</h2>
        <div id="licensesArea" class="muted">Loading licenses…</div>
      </div>

      <div id="guestArea" style="display:none;">
        <div class="hero-actions" style="margin-top:14px;">
          <a class="btn" href="/sign-in.html">Log in</a>
          <a class="btn ghost" href="/sign-up.html">Create account</a>
        </div>
      </div>

      <p id="err" class="muted" style="margin-top:12px;color:#b00020;"></p>
    </section>
  </main>

  <script defer crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsua25vd3N0cmlkZS5jb20k" src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
  <script>
    function fmtDate(value) {
      if (!value) return "-";
      const d = new Date(value.length <= 10 ? value + 'T00:00:00Z' : value);
      return isNaN(d.getTime()) ? value : d.toLocaleDateString();
    }

    function isExpired(expiresAt) {
      if (!expiresAt) return false;
      const today = new Date();
      const d = new Date(expiresAt + 'T23:59:59Z');
      return !isNaN(d.getTime()) && today > d;
    }

    function esc(s) {
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert('License key copied.');
      } catch {
        alert('Could not copy automatically.');
      }
    }

    window.addEventListener('load', async () => {
      try {
        await Clerk.load();
        const user = Clerk.user;
        const userArea = document.getElementById('userArea');
        const guestArea = document.getElementById('guestArea');
        const loginLink = document.getElementById('loginLink');

        if (!user) {
          guestArea.style.display = 'block';
          return;
        }

        if (loginLink) loginLink.style.display = 'none';
        userArea.style.display = 'block';

        const email = user?.primaryEmailAddress?.emailAddress || user?.emailAddresses?.[0]?.emailAddress || '';
        document.getElementById('userEmail').textContent = email || 'Signed in';
        document.getElementById('logoutBtn').onclick = async () => {
          try { await Clerk.signOut(); } finally { window.location.href = '/'; }
        };
        Clerk.mountUserButton(document.getElementById('userButton'));

        const token = await Clerk.session.getToken();
        const res = await fetch('/api/licenses', {
          headers: token ? { Authorization: `Bearer ${token}` } : {}
        });
        const data = await res.json().catch(() => ({}));
        const area = document.getElementById('licensesArea');

        if (!res.ok) {
          area.textContent = data?.error || 'Could not load licenses.';
          return;
        }

        const licenses = Array.isArray(data?.licenses) ? data.licenses : [];
        if (!licenses.length) {
          area.innerHTML = '<div class="muted">No licenses yet.</div>';
          return;
        }

        area.classList.remove('muted');
        area.innerHTML = licenses.map((lic, idx) => {
          const expired = isExpired(lic.expires_at);
          const badgeClass = expired ? 'badge expired' : 'badge';
          const badgeText = expired ? 'Expired' : (lic.status || 'Active');
          const invoice = lic.stripe_invoice_url
            ? `<a class="btn ghost" href="${esc(lic.stripe_invoice_url)}" target="_blank" rel="noopener">Open invoice</a>`
            : '';
          return `
            <div class="license-card">
              <div class="license-head">
                <div>
                  <div class="license-title">${esc(lic.plan || 'BOLO License')}</div>
                  <div class="license-meta">Issued ${esc(fmtDate(lic.issued_at))}</div>
                </div>
                <div class="${badgeClass}">${esc(badgeText)}</div>
              </div>

              <div class="grid">
                <div class="kv"><div class="k">Seats</div><div class="v">${esc(lic.seats || 1)}</div></div>
                <div class="kv"><div class="k">Period</div><div class="v">${esc(lic.period_months || '-')} months</div></div>
                <div class="kv"><div class="k">Expires</div><div class="v">${esc(fmtDate(lic.expires_at))}</div></div>
              </div>

              <div class="license-key-box">
                <div class="row" style="justify-content:space-between;">
                  <strong>License key</strong>
                  <div class="row">
                    <button class="btn" type="button" onclick="copyText(${JSON.stringify(String(lic.license_key || ''))})">Copy license key</button>
                    ${invoice}
                  </div>
                </div>
                <pre>${esc(lic.license_key || '')}</pre>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        document.getElementById('err').textContent = err?.message || String(err);
      }
    });
  </script>
</body>
</html>
