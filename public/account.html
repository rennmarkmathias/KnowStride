<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Account — BOLO AI Publishing Pipeline</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .license-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, .08);
      background: rgba(0, 0, 0, .02);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef6ff;
      color: #1d4ed8;
      font-weight: 800;
      font-size: .82rem;
    }

    .license-key {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(0,0,0,.08);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: .92rem;
      word-break: break-all;
    }

    .invoice-link {
      margin-top: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="toplink" href="/">← Home</a>
    <div class="brand">BOLO AI Publishing Pipeline</div>
    <nav class="topnav">
      <a class="toplink" href="/sign-in.html" id="loginLink">Log in</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Account</h1>
      <p class="muted">
        Use your account to review your BOLO purchases and active license details.
      </p>

      <div id="userArea" style="display:none;">
        <div class="license-box">
          <div class="muted small">Signed in as</div>
          <div id="userEmail" style="font-weight:800;"></div>

          <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <button class="btn" id="logoutBtn" type="button">Log out</button>
            <div id="userButton"></div>
          </div>
        </div>

        <h2 style="margin-top:22px;">License status</h2>
        <div id="licensesArea" class="muted">Loading licenses…</div>
      </div>

      <div id="guestArea" style="display:none;">
        <div class="hero-actions" style="margin-top:14px;">
          <a class="btn" href="/sign-in.html">Log in</a>
          <a class="btn ghost" href="/sign-up.html">Create account</a>
        </div>
      </div>

      <p id="err" class="muted" style="margin-top:12px;color:#b00020;"></p>
    </section>
  </main>

  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsuYm9sb3dyaXRlci5jb20k"
    src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js"></script>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.addEventListener("load", async () => {
      try {
        await Clerk.load();

        const user = Clerk.user;
        const userArea = document.getElementById("userArea");
        const guestArea = document.getElementById("guestArea");
        const loginLink = document.getElementById("loginLink");
        const licensesArea = document.getElementById("licensesArea");
        const errEl = document.getElementById("err");

        if (!user) {
          guestArea.style.display = "block";
          return;
        }

        if (loginLink) {
          loginLink.style.display = "none";
        }

        userArea.style.display = "block";

        const email =
          user?.primaryEmailAddress?.emailAddress ||
          user?.emailAddresses?.[0]?.emailAddress ||
          "Signed in";

        document.getElementById("userEmail").textContent = email;

        document.getElementById("logoutBtn").onclick = async () => {
          try {
            await Clerk.signOut();
          } finally {
            location.href = "/";
          }
        };

        if (typeof Clerk.mountUserButton === "function") {
          Clerk.mountUserButton(document.getElementById("userButton"));
        }

        try {
          const token = await Clerk.session.getToken();
          const res = await fetch("/api/licenses", {
            headers: {
              "authorization": `Bearer ${token}`
            }
          });

          const contentType = res.headers.get("content-type") || "";
          const data = contentType.includes("application/json")
            ? await res.json()
            : { error: await res.text() };

          if (!res.ok) {
            licensesArea.textContent = "";
            errEl.textContent = data?.error || data?.message || `Could not load licenses (${res.status}).`;
            return;
          }

          if (!Array.isArray(data?.licenses) || !data.licenses.length) {
            licensesArea.textContent = "No active licenses found yet.";
            return;
          }

          licensesArea.innerHTML = data.licenses.map((l) => `
            <div class="license-box">
              <div class="row">
                <span>Plan</span>
                <strong>${escapeHtml(l.plan || "—")}</strong>
              </div>
              <div class="row">
                <span>Seats</span>
                <strong>${escapeHtml(l.seats || 1)}</strong>
              </div>
              <div class="row">
                <span>Issued</span>
                <strong>${escapeHtml(l.issued_at || "—")}</strong>
              </div>
              <div class="row">
                <span>Expires</span>
                <strong>${escapeHtml(l.expires_at || "—")}</strong>
              </div>
              <div class="row">
                <span>Status</span>
                <span class="badge">${escapeHtml(l.status || "active")}</span>
              </div>
              ${
                l.license_key
                  ? `<div class="license-key">${escapeHtml(l.license_key)}</div>`
                  : ``
              }
              ${
                l.stripe_invoice_url
                  ? `<a class="invoice-link" href="${escapeHtml(l.stripe_invoice_url)}" target="_blank" rel="noopener">Open invoice</a>`
                  : ``
              }
            </div>
          `).join("");
        } catch (e) {
          licensesArea.textContent = "";
          errEl.textContent = e?.message || String(e);
        }
      } catch (e) {
        document.getElementById("err").textContent = e?.message || String(e);
      }
    });
  </script>
</body>
</html>
