<script>
  const PLAN_MAP = {
    solo_6m: {
      name: "Individual – 6 months",
      seats: 1,
      period: "6 months",
      amount: "$49"
    },
    solo_12m: {
      name: "Individual – 12 months",
      seats: 1,
      period: "12 months",
      amount: "$79"
    },
    solo_36m: {
      name: "Individual – 36 months",
      seats: 1,
      period: "36 months",
      amount: "$149"
    },
    team_3: {
      name: "Team – 3 seats",
      seats: 3,
      period: "12 months",
      amount: "$249"
    },
    team_5: {
      name: "Team – 5 seats",
      seats: 5,
      period: "12 months",
      amount: "$399"
    },
    team_10: {
      name: "Organization – 10 seats",
      seats: 10,
      period: "12 months",
      amount: "$499"
    }
  };

  function getPlanFromUrl() {
    const p = new URLSearchParams(location.search);
    return p.get("plan") || "solo_12m";
  }

  function renderPlans(active) {
    const wrap = document.getElementById("plans");

    wrap.innerHTML = Object.entries(PLAN_MAP)
      .map(([k, p]) => `
        <article class="plan-card ${k === active ? "active" : ""}">
          <span class="pill">${p.seats > 1 ? "Team license" : "Individual license"}</span>
          <h3>${p.name}</h3>
          <div class="plan-price">${p.amount}</div>
          <p class="muted">Seats: ${p.seats}<br>Period: ${p.period}</p>
          <button class="btn ${k === active ? "" : "ghost"}" data-plan="${k}" type="button">
            ${k === active ? "Selected" : "Select this plan"}
          </button>
        </article>
      `)
      .join("");

    wrap.querySelectorAll("[data-plan]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const plan = btn.getAttribute("data-plan");
        const url = new URL(location.href);
        url.searchParams.set("plan", plan);
        location.href = url.toString();
      });
    });
  }

  function updateSummary(k) {
    const p = PLAN_MAP[k];
    document.getElementById("selectedPlan").textContent = p.name;
    document.getElementById("selectedSeats").textContent = String(p.seats);
    document.getElementById("selectedPeriod").textContent = p.period;
    document.getElementById("selectedPrice").textContent = p.amount;
  }

  window.addEventListener("load", async () => {
    const planKey = getPlanFromUrl();
    renderPlans(planKey);
    updateSummary(planKey);

    try {
      await Clerk.load();

      const user = Clerk.user;
      if (!user) {
        location.href = `/sign-in.html?plan=${encodeURIComponent(planKey)}`;
        return;
      }

      const email =
        user?.primaryEmailAddress?.emailAddress ||
        user?.emailAddresses?.[0]?.emailAddress ||
        "Signed in";

      document.getElementById("userEmail").textContent = email;

      document.getElementById("checkoutBtn").addEventListener("click", async () => {
        const msg = document.getElementById("msg");
        const err = document.getElementById("err");

        msg.textContent = "Creating secure checkout session…";
        err.textContent = "";

        try {
          const token = await Clerk.session.getToken();
          const res = await fetch("/api/create-license-checkout-session", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ plan: planKey })
          });

          const contentType = res.headers.get("content-type") || "";
          const data = contentType.includes("application/json")
            ? await res.json()
            : { error: await res.text() };

          if (!res.ok) {
            throw new Error(
              data?.message ||
              data?.error ||
              `Could not create checkout session (${res.status}).`
            );
          }

          if (!data?.url) {
            throw new Error("Missing Stripe checkout URL.");
          }

          location.href = data.url;
        } catch (e) {
          msg.textContent = "";
          err.textContent = e?.message || String(e);
        }
      });
    } catch (e) {
      document.getElementById("err").textContent = e?.message || String(e);
    }
  });
</script>
