<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BOLO AI Publishing Pipeline — Sign up</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="toplink" href="/">← Back</a>
    <div class="brand">BOLO AI Publishing Pipeline</div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Create your account</h1>
      <p class="muted">
        Sign up with Google or email to buy and manage your BOLO license.
      </p>

      <div id="sign-up" style="margin-top:14px;"></div>
      <p id="err" class="muted" style="margin-top:12px;color:#b00020;"></p>
    </section>
  </main>

  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsuYm9sb3dyaXRlci5jb20k"
    src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js"></script>

  <script>
    window.addEventListener("load", async () => {
      const params = new URLSearchParams(location.search);
      const plan = params.get("plan");
      const nextUrl = plan
        ? `/checkout.html?plan=${encodeURIComponent(plan)}`
        : "/account.html";

      try {
        await Clerk.load();

        Clerk.mountSignUp(document.getElementById("sign-up"), {
          signInUrl: plan
            ? `/sign-in.html?plan=${encodeURIComponent(plan)}`
            : "/sign-in.html",
          afterSignUpUrl: nextUrl,
        });
      } catch (e) {
        document.getElementById("err").textContent = e?.message || String(e);
      }
    });
  </script>
</body>
</html>
