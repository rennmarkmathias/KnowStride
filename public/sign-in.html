<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BOLO AI Publishing Pipeline — Sign in</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="toplink" href="/">← Back</a>
    <div class="brand">BOLO AI Publishing Pipeline</div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Log in</h1>
      <p class="muted">
        Use Google or email to access your BOLO account and continue to checkout.
      </p>

      <!-- Clerk UI mount -->
      <div id="sign-in" style="margin-top:20px;"></div>

      <p id="err" class="muted" style="margin-top:12px;color:#b00020;"></p>
    </section>
  </main>

  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsuYm9sb3dyaXRlci5jb20k"
    src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js">
  </script>

  <script>
    window.addEventListener("load", async () => {
      const params = new URLSearchParams(location.search);
      const plan = params.get("plan");

      const nextUrl = plan
        ? `/checkout.html?plan=${encodeURIComponent(plan)}`
        : "/account.html";

      try {
        await Clerk.load();

        Clerk.mountSignIn(document.getElementById("sign-in"), {
          signUpUrl: plan
            ? `/sign-up.html?plan=${encodeURIComponent(plan)}`
            : "/sign-up.html",
          afterSignInUrl: nextUrl,

          appearance: {
            elements: {
              card: "shadow-none border-none bg-transparent",
              rootBox: "w-full",
            }
          }
        });

      } catch (e) {
        document.getElementById("err").textContent = e?.message || String(e);
      }
    });
  </script>
</body>
</html>
