<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BOLO — Sign in</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="toplink" href="/">← Back</a>
    <div class="brand">BOLO</div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Log in</h1>
      <p class="muted">Use Google or email.</p>
      <div id="sign-in" style="margin-top:14px;"></div>
      <p id="err" class="muted" style="margin-top:12px;color:#b00020;"></p>
    </section>
  </main>
<script crossorigin="anonymous" src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
  <script>
    const CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsua25vd3N0cmlkZS5jb20k";

    function setClerkError(message) {
      const errEl = document.getElementById("err");
      if (errEl) errEl.textContent = message || "";
    }

    async function waitForClerk(timeoutMs = 10000) {
      const start = Date.now();
      while (!window.Clerk) {
        if (Date.now() - start > timeoutMs) {
          throw new Error("Clerk script did not load. Check your publishable key and allowed domains in Clerk.");
        }
        await new Promise(resolve => setTimeout(resolve, 50));
      }
      return window.Clerk;
    }

    async function initClerk() {
      const clerk = await waitForClerk();
      await clerk.load({ publishableKey: CLERK_PUBLISHABLE_KEY });
      return clerk;
    }
  </script>
<script>
    function getAfterAuthUrl() {
      const params = new URLSearchParams(window.location.search);
      const plan = params.get("plan");
      return plan ? `/checkout.html?plan=${encodeURIComponent(plan)}` : "/account.html";
    }

    window.addEventListener("load", async () => {
      try {
        const clerk = await initClerk();
        clerk.mountSignIn(document.getElementById("sign-in"), {
          signUpUrl: window.location.search ? `/sign-up.html${window.location.search}` : "/sign-up.html",
          forceRedirectUrl: getAfterAuthUrl(),
          fallbackRedirectUrl: getAfterAuthUrl(),
        });
      } catch (e) {
        setClerkError(e?.message || String(e));
      }
    });
  </script>
</body>
</html>
